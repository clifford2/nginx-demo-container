---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "nginx-demo"
  labels:
    app.kubernetes.io/name: "nginx-demo"
    app.kubernetes.io/instance: "nginx-demo"
    app.kubernetes.io/component: "website"
    app: "nginx-demo"
spec:
  type: "NodePort"
  ports:
    - name: "http"
      port: 8080
      protocol: "TCP"
      targetPort: "http"
  selector:
    app.kubernetes.io/name: "nginx-demo"
  sessionAffinity: "None"
