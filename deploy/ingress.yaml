---
apiVersion: "networking.k8s.io/v1"
kind: "Ingress"
metadata:
  name: "nginx-demo"
spec:
  ingressClassName: "traefik"
  rules:
    - host: "nginx-demo.example.net"
      http:
        paths:
          - backend:
              service:
                name: "nginx-demo"
                port:
                  name: "http"
            path: "/"
            pathType: "Prefix"
